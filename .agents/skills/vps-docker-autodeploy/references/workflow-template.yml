---
name: Deploy to production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only validate SSH connectivity and server prerequisites"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-prod-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      APP_DIR: "<APP_DIR>"
      SERVICE_NAME: "<SERVICE_NAME>"
      REPO_SLUG: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH credentials
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Dry-run connectivity check
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'GH_TOKEN=%q\n' "${GH_TOKEN}"
            printf 'REPO_SLUG=%q\n' "${REPO_SLUG}"
            printf 'APP_DIR=%q\n' "${APP_DIR}"
            cat <<'SSH'
          set -euo pipefail
          cd "/opt/${APP_DIR}"
          test -f .env
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            ls-remote "https://github.com/${REPO_SLUG}.git" HEAD >/dev/null
          unset GH_TOKEN auth_header
          docker compose version
          docker compose ps
          SSH
          } | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -s"

      - name: Deploy on VPS
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'GH_TOKEN=%q\n' "${GH_TOKEN}"
            printf 'REPO_SLUG=%q\n' "${REPO_SLUG}"
            printf 'APP_DIR=%q\n' "${APP_DIR}"
            printf 'SERVICE_NAME=%q\n' "${SERVICE_NAME}"
            cat <<'SSH'
          set -euo pipefail
          cd "/opt/${APP_DIR}"

          if [ ! -f .env ]; then
            echo "ERROR: missing /opt/${APP_DIR}/.env" >&2
            exit 1
          fi

          prev_commit=""
          if [ -d .git ]; then
            prev_commit="$(git rev-parse HEAD)"
          fi

          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"

          if [ -d .git ]; then
            git remote set-url origin "https://github.com/${REPO_SLUG}.git"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --prune origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd -e .env
          else
            bootstrap_dir="$(mktemp -d "/tmp/${APP_DIR}-bootstrap-XXXXXX")"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              clone --depth 1 --branch main "https://github.com/${REPO_SLUG}.git" "$bootstrap_dir"
            cp .env "$bootstrap_dir/.env"
            find . -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
            cp -a "$bootstrap_dir"/. .
            rm -rf "$bootstrap_dir"
          fi

          unset GH_TOKEN auth_header

          docker compose up -d --build
          docker compose ps --status running "${SERVICE_NAME}"

          container_id="$(docker compose ps -q "${SERVICE_NAME}")"
          started_at="$(docker inspect -f '{{.State.StartedAt}}' "$container_id")"
          started_epoch="$(date -d "$started_at" +%s)"
          now_epoch="$(date +%s)"
          age="$((now_epoch - started_epoch))"

          sleep 5
          service_logs="$(docker compose logs --since "$started_at" --tail=200 "${SERVICE_NAME}" || true)"
          printf '%s\n' "$service_logs"

          if grep -Eq "Traceback \(most recent call last\)|CRITICAL" <<<"$service_logs"; then
            if [ -n "$prev_commit" ]; then
              git reset --hard "$prev_commit"
              docker compose up -d --build
            fi
            echo "ERROR: fatal markers detected in logs" >&2
            exit 1
          fi

          if [ "$age" -le 300 ] && ! grep -q "Starting scheduler" <<<"$service_logs"; then
            if [ -n "$prev_commit" ]; then
              git reset --hard "$prev_commit"
              docker compose up -d --build
            fi
            echo "ERROR: scheduler startup marker not found for fresh container" >&2
            exit 1
          fi

          docker image prune -f --filter "until=168h"
          SSH
          } | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -s"